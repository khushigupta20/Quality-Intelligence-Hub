<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Quality Intelligence Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #f4f4f4;
      color: #161616;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top header strip ── */
    .login-header {
      background: #0043ce;
      padding: 14px 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .login-header-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
    }
    .login-header-tag {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    /* ── Page body ── */
    .login-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Card ── */
    .login-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #161616;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      font-size: 0.875rem;
      color: #525252;
      margin-bottom: 2rem;
    }

    /* ── Form fields ── */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #525252;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 5px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #161616;
      background: #ffffff;
      transition: border-color 0.15s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #0f62fe;
      box-shadow: 0 0 0 2px #edf5ff;
    }

    /* password row with show/hide */
    .pw-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .pw-row input { flex: 1; }
    .pw-toggle {
      padding: 0.55rem 0.85rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 5px;
      background: #ffffff;
      font-family: inherit;
      font-size: 0.8rem;
      color: #525252;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .pw-toggle:hover { border-color: #0f62fe; color: #0f62fe; }

    /* ── Submit button ── */
    .btn-signin {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f62fe;
      color: #ffffff;
      border: none;
      border-radius: 5px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-signin:hover:not(:disabled) { background: #0043ce; }
    .btn-signin:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error / info messages ── */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 5px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
    .alert-error {
      background: #fff1f1;
      border: 1px solid #fca5a5;
      color: #da1e28;
    }
    .alert-info {
      background: #edf5ff;
      border: 1px solid #d0e2ff;
      color: #0043ce;
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.72rem;
      color: #8d8d8d;
      border-top: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="login-header">
    <div>
      <div class="login-header-name">Quality Intelligence Hub</div>
      <div class="login-header-tag">Powered by IBM</div>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-body">
    <div class="login-card">
      <h1>Sign In</h1>
      <p class="login-subtitle">Enter your credentials to access the hub.</p>

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      {% if info %}
        <div class="alert alert-info">{{ info }}</div>
      {% endif %}

      <form method="POST" action="/login" id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Enter username"
                 value="{{ username or '' }}"
                 autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="pw-row">
            <input type="password" id="password" name="password"
                   placeholder="Enter password"
                   autocomplete="current-password" required />
            <button type="button" class="pw-toggle" id="pw-toggle"
                    onclick="togglePw()">Show</button>
          </div>
        </div>

        <button type="submit" class="btn-signin" id="signin-btn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <div class="login-footer">Made with IBM Bob</div>

  <script>
    function togglePw() {
      const inp    = document.getElementById('password');
      const toggle = document.getElementById('pw-toggle');
      if (inp.type === 'password') {
        inp.type         = 'text';
        toggle.textContent = 'Hide';
      } else {
        inp.type         = 'password';
        toggle.textContent = 'Show';
      }
    }

    // Show spinner on form submit
    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('signin-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Signing in…';
    });
  </script>
</body>
</html>
